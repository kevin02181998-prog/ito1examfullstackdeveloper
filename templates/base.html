<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Task Manager{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">
    <nav class="bg-blue-600 text-white shadow-md">
        <div class="max-w-6xl mx-auto px-4 py-3 flex justify-between items-center">
            <a href="{% url 'dashboard' %}" class="text-xl font-bold">Task Manager</a>
            <div class="flex items-center gap-4">
                {% if user.is_authenticated %}
                    <a href="{% url 'profile' %}" class="text-sm hover:underline">
                        {{ user.get_full_name|default:user.username }}
                        {% if user.is_staff %}(Admin){% endif %}
                    </a>
                    <a href="{% url 'logout' %}" class="bg-white text-blue-600 px-3 py-1 rounded text-sm font-medium hover:bg-gray-100">Logout</a>
                {% else %}
                    <a href="{% url 'login' %}" class="hover:underline text-sm">Login</a>
                    <a href="{% url 'register' %}" class="bg-white text-blue-600 px-3 py-1 rounded text-sm font-medium hover:bg-gray-100">Register</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-4 py-6">
        {% if messages %}
            {% for message in messages %}
                <div class="alert-msg mb-4 p-3 rounded transition-all duration-500 {% if message.tags == 'success' %}bg-green-100 text-green-800{% elif message.tags == 'error' %}bg-red-100 text-red-800{% else %}bg-blue-100 text-blue-800{% endif %}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        {% block content %}{% endblock %}
    </main>

    <script>
        setTimeout(function() {
            document.querySelectorAll('.alert-msg').forEach(function(el) {
                el.style.opacity = '0';
                setTimeout(function() { el.remove(); }, 500);
            });
        }, 3000);
    </script>
</body>
</html>
